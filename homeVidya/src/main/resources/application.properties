spring.application.name=homeVidya

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hvdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=hvuser
spring.datasource.password=hvpwd
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Hibernate dialect metadata configuration (fixes the warning)
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server configuration
server.port=8080

# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.homevidya=DEBUG