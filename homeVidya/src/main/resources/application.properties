spring.application.name=homeVidya

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hvdb
spring.datasource.username=hvuser
spring.datasource.password=hvpwd
spring.jpa.defer-datasource-initialization=true
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Hibernate dialect metadata configuration (fixes the warning)
#spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Server configuration
server.port=8080

# Logging configuration
logging.level.org.springframework=DEBUG
logging.level.com.homevidya=DEBUG
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.use-root-path=true

# --- Springdoc workaround for Spring 7 (Boot 4) compatibility ---
springdoc.override-with-generic-response=false
